name: Build Whimsy S1 APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Create npm project
        run: |
          cat > package.json <<'EOF'
          {
            "name": "whimsy-s1",
            "version": "1.0.0",
            "private": true
          }
          EOF

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Prepare web app folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/manifest.json
          cp sw.js www/sw.js

      - name: Create Capacitor config
        run: |
          rm -f capacitor.config.ts
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.whimsy.s1",
            "appName": "Whimsy S1",
            "webDir": "www"
          }
          EOF

      - name: Create Android project
        run: npx cap add android

      - name: Sync Whimsy files into Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload Whimsy S1 APK
        uses: actions/upload-artifact@v4
        with:
          name: Whimsy-S1-debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
