name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK with pwa2apk (Docker)
        run: |
          # Run pwa2apk inside the official Docker image
          docker run --rm -v "$(pwd)":/app bubenshchykov/pwa2apk \
            pwa2apk --input /app --output /app/apk \
                    --name "Whimsy S1" \
                    --package "com.whimsy.s1"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: whimsy-s1-apk
          path: ./apk/*.apk
